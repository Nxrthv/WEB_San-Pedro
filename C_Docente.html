<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <title>Document</title>
    <style>
        .btn-buscar {
        border-radius: 5px;
        border: 1px solid rgba(128, 128, 128, 0.342);
        transition: .4s ease;
        width: 8em;
        align-items: center;
        }
        .btn-buscar:hover{
            transform: scale(1.05);
            transition: .4s ease;
            background-color: rgba(123, 128, 116, 0.387);
        }
        .gray{
            color: rgba(0, 0, 0, 0.394);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="display-4 text-center py-4">ESTUDIANTES</div>
        <form class="row">
            <div class="col-3">
                <select name="seccion" id="seccion" class="form-control">
                    <option value = "invalid" class="gray">GRADOS</option>
                    <option value = "PRIMERO">PRIMERO</option>
                    <option value = "SEGUNDO">SEGUNDO</option>
                    <option value = "TERCERO">TERCERO</option>
                    <option value = "CUARTO">CUARTO</option>
                    <option value = "QUINTO">QUINTO</option>
                    <option value = "SEXTO">SEXTO</option>
                </select>
            </div>
            <div class="col-3">
                <select name="grado" id="grado" class="form-control">
                    <option value="invalid" class="gray">SECCIONES</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="G">G</option>
                </select>
            </div>
            <button class="col-3 btn-buscar text-center pointer">BUSCAR</button>
        </form>
        <div class="py-4 table-responsive">
            <table class="table table-hover table-sm text-center" id="tabla">
                <thead>
                    <tr>
                        <th>DNI/ESTUDIANTE</th>
                        <th>NOMBRE/ESTUDIANTE</th>
                        <th>NOMBRE/APODERADO</th>
                        <th>DNI/PODERADO</th>
                        <th>TELEFONO</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- contenido -->
                </tbody>
            </table>
        </div>
        <!-- Casillas -->
        <div class="py-2 row">
            <div class="col-4">
                <label class="py-2" for="">INGRESE DNI DEL ESTUDIANTE:</label>
                <input class="form-control" placeholder="DNI" type="text">
            </div>
            <div class="col-4">
                <label class="py-2" for="">INGRESE NOMBRE COMPLETO DEL ESTUDIANTE:</label>
                <input class="form-control" placeholder="NOMBRE" type="text">
            </div>
            <div class="col-4">
                <label class="py-2" for="">INGRESE NOMBRE COMPLETO EL APODERADO:</label>
                <input class="form-control" placeholder="NOMBRE" type="text">
            </div>
            <div class="col-4">
                <label class="py-2" for="">INGRESE DNI DEL APODERADO:</label>
                <input class="form-control" placeholder="DNI" type="text">
            </div>
            <div class="col-4">
                <label class="py-2" for="">INGRESE NUMERO DE CONTACTO:</label>
                <input class="form-control" placeholder="TELEFONO" type="text">
            </div>
        </div>
    </div>
</body>
</html>
